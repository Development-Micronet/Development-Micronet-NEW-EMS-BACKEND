<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ brand_name }}{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4efe6;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">
        {% block preheader %}{% endblock %}
    </div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4efe6;margin:0;padding:24px 0;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;background-color:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 12px 32px rgba(14,45,87,0.10);">
                    <tr>
                        <td style="padding:28px 32px 18px 32px;background:linear-gradient(180deg,#fbfaf7 0%,#f5efe4 100%);border-bottom:1px solid #e6ded1;text-align:center;">
                            <div style="font-family:Georgia,'Times New Roman',serif;font-size:54px;line-height:1.1;font-style:italic;font-weight:700;color:#0e2d57;letter-spacing:0.5px;margin:0 auto 10px auto;">
                                Ace Technologies
                            </div>
                            <div style="font-family:Arial,Helvetica,sans-serif;font-size:26px;line-height:1.2;color:#0e2d57;font-weight:700;margin:0 auto 14px auto;">
                                Email: {{ support_email }}
                            </div>
                            <div style="font-size:14px;line-height:20px;color:#526075;">
                                Professional communication from {{ brand_name }}
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:32px;">
                            <div style="font-size:28px;line-height:34px;font-weight:700;color:#0e2d57;margin:0 0 12px 0;">
                                {% block heading %}{% endblock %}
                            </div>
                            <div style="font-size:16px;line-height:26px;color:#334155;">
                                {% block content %}{% endblock %}
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:22px 32px;background-color:#f8fafc;border-top:1px solid #e6edf5;">
                            <div style="font-size:13px;line-height:22px;color:#64748b;">
                                Need help? Contact us at
                                <a href="mailto:{{ support_email }}" style="color:#0e2d57;text-decoration:none;font-weight:700;">{{ support_email }}</a>.
                            </div>
                            <div style="font-size:12px;line-height:18px;color:#94a3b8;margin-top:8px;">
                                This is an automated message from {{ brand_name }}.
                            </div>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
